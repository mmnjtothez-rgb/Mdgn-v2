name: Build MDGN Cordova APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Vite dependencies
        run: npm install

      - name: Build Vite project
        run: npm run build

      - name: Install Cordova globally
        run: npm install -g cordova

      - name: Install Cordova Android platform
        run: |
          cd cordova
          npm install

      - name: Copy Vite build into Cordova www
        run: |
          rm -rf cordova/www/*
          cp -r dist/* cordova/www/

      - name: Build APK
        run: |
          cd cordova
          cordova platform add android
          cordova build android

      - name: Find APK file
        id: find_apk
        run: |
          APK_PATH=$(find cordova/platforms/android -name "*.apk" | head -n 1)
          echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdgn-cordova-apk
          path: ${{ steps.find_apk.outputs.APK_PATH }}
      - name: Copy web assets
        run: npx cap copy

      - name: Clean Gradle cache (IMPORTANT FIX)
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/wrapper/

      - name: Build APK
        run: |
          cd android
          ./gradlew --no-daemon --warning-mode all assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdgn-app-apk
          path: android/app/build/outputs/apk/release/app-release.apk
