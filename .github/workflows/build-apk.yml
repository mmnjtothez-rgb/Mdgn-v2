name: Build MDGN Cordova APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Vite dependencies
        run: npm install

      - name: Build Vite project
        run: npm run build

      - name: Install Cordova globally
        run: npm install -g cordova

      # IMPORTANT: Remove old Android platform so Cordova does NOT reuse it
      - name: Remove old Android platform
        run: |
          rm -rf cordova/platforms/android

      # Install Cordova Android 12 (compatible with Gradle 9)
      - name: Install Cordova Android 12 inside repo Cordova folder
        run: |
          cd cordova
          npm install
          cordova platform add android@12

      # Copy Vite build into Cordova's WebView folder
      - name: Copy Vite build into Cordova www
        run: |
          rm -rf cordova/www/*
          cp -r dist/* cordova/www/

      # Build the APK
      - name: Build APK
        run: |
          cd cordova
          cordova build android

      # Find the generated APK file
      - name: Find APK file
        id: find_apk
        run: |
          APK_PATH=$(find cordova/platforms/android -name "*.apk" | head -n 1)
          echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT

      # Upload the APK as an artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdgn-cordova-apk
          path: ${{ steps.find_apk.outputs.APK_PATH }}
