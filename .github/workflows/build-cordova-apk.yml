name: Build Cordova WebView APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Vite dependencies
        run: npm install

      - name: Build Vite project
        run: npm run build

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova project
        run: |
          cordova create cordova-app com.mdgn.app mdgnapp
          cd cordova-app
          cordova platform add android

      - name: Copy built Vite app into Cordova
        run: |
          rm -rf cordova-app/www/*
          cp -r dist/* cordova-app/www/

      - name: Build APK
        run: |
          cd cordova-app
          cordova build android

      - name: Find APK file
        id: find_apk
        run: |
          APK_PATH=$(find cordova-app/platforms/android -name "*.apk" | head -n 1)
          echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdgn-cordova-apk
          path: ${{ steps.find_apk.outputs.APK_PATH }}
